# =======================
# QUARKUS SERVER SETTINGS
# =======================
# Porta padrão da API
quarkus.http.port=8080

# Habilitar CORS para front-end rodando em localhost:3000
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H

# =======================
# POSTGRESQL / NEON SETTINGS
# =======================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=neondb_owner
quarkus.datasource.password=npg_4Wg8TrdjLqSm
quarkus.datasource.jdbc.url=jdbc:postgresql://pg.neon.tech:5432/neondb
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.transaction-isolation=READ_COMMITTED

# Habilitar o Hibernate ORM e geração de tabelas (apenas dev)
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# =======================
# SWAGGER / OPENAPI
# =======================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui

# =======================
# JTA TRANSACTIONS
# =======================
quarkus.transaction-manager.default-transaction-timeout=300
